<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>estrellafugaz — Chat con Mistral</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #06060f;
            --bg-card: #0f0f22;
            --bg-chat: #12122a;
            --bg-input: #1a1a35;
            --text-primary: #e8e8f2;
            --text-secondary: #a0a0c0;
            --accent-gold: #f0b940;
            --accent-purple: #7c5cfc;
            --accent-purple-hover: #9178ff;
            --bubble-user: #4f3cc9;
            --bubble-ai: #1e1e3a;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --shadow-glow: 0 0 40px rgba(124, 92, 252, 0.25);
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --font: 'Outfit', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Fondo estrellado ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(1px 1px at 10% 15%, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(1px 1px at 22% 8%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1.5px 1.5px at 35% 20%, rgba(255, 255, 255, 0.65), transparent),
                radial-gradient(1px 1px at 48% 5%, rgba(255, 255, 255, 0.45), transparent),
                radial-gradient(1.5px 1.5px at 55% 18%, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(1px 1px at 62% 12%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 70% 22%, rgba(255, 255, 255, 0.55), transparent),
                radial-gradient(1.5px 1.5px at 78% 7%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 85% 16%, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(1px 1px at 92% 10%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1.5px 1.5px at 15% 30%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(1px 1px at 28% 35%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 42% 28%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1.5px 1.5px at 58% 33%, rgba(255, 255, 255, 0.45), transparent),
                radial-gradient(1px 1px at 68% 25%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 80% 38%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1.5px 1.5px at 88% 30%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(1px 1px at 5% 45%, rgba(255, 255, 255, 0.45), transparent),
                radial-gradient(1px 1px at 18% 42%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 32% 48%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1.5px 1.5px at 50% 40%, rgba(255, 255, 255, 0.55), transparent),
                radial-gradient(1px 1px at 65% 46%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 75% 44%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 90% 50%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(2px 2px at 20% 55%, rgba(240, 185, 64, 0.3), transparent),
                radial-gradient(1.5px 1.5px at 60% 58%, rgba(240, 185, 64, 0.25), transparent),
                radial-gradient(2px 2px at 82% 52%, rgba(240, 185, 64, 0.2), transparent);
            animation: twinkle 6s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.75;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.7;
            }
        }

        /* ── Estrellas fugaces ── */
        .shooting-star {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            width: 2px;
            height: 90px;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.7) 40%,
                    rgba(240, 220, 160, 1) 70%,
                    rgba(240, 185, 64, 0.9) 100%);
            border-radius: 50% 50% 50% 50% / 10% 10% 60% 60%;
            transform: rotate(-30deg);
            animation: shoot var(--dur) linear infinite;
            animation-delay: var(--delay);
            top: -120px;
            left: var(--start-x);
            opacity: 0;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 12px 4px rgba(255, 220, 140, 0.9), 0 0 30px 10px rgba(240, 185, 64, 0.5);
        }

        @keyframes shoot {
            0% {
                transform: translateY(0) translateX(0) rotate(-30deg);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            15% {
                opacity: 1;
            }
            30% {
                transform: translateY(85vh) translateX(40vw) rotate(-30deg);
                opacity: 0;
            }
            100% {
                transform: translateY(85vh) translateX(40vw) rotate(-30deg);
                opacity: 0;
            }
        }

        /* ── Contenedor principal ── */
        .app-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 780px;
            margin: 0 auto;
            padding: 12px 16px;
            gap: 10px;
        }

        /* ── Header ── */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-icon {
            font-size: 1.8rem;
            animation: iconPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(240, 185, 64, 0.5));
        }
        @keyframes iconPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }
        .header-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f5d780 0%, #f0b940 40%, #e8a420 70%, #f5d780 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer {
            0% {
                background-position: 0% center;
            }
            100% {
                background-position: 200% center;
            }
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-subtle);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: var(--transition);
            position: relative;
            flex-shrink: 0;
        }
        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(124, 92, 252, 0.3);
        }
        .btn-icon:active {
            transform: scale(0.94);
        }
        .api-indicator {
            position: absolute;
            top: 7px;
            right: 7px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #555;
            transition: var(--transition);
            border: 1.5px solid var(--bg-card);
        }
        .api-indicator.active {
            background: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.6);
        }
        .btn-clear {
            font-size: 0.85rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 20px;
            transition: var(--transition);
            font-family: var(--font);
            font-weight: 500;
            white-space: nowrap;
        }
        .btn-clear:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.08);
        }

        /* ── Área de chat ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
            min-height: 0;
            border-radius: var(--radius-lg);
            background: var(--bg-chat);
            border: 1px solid var(--border-subtle);
            box-shadow: inset 0 2px 20px rgba(0, 0, 0, 0.3);
        }
        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 10px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .chat-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ── Mensajes ── */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: msgIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .msg-row.assistant {
            align-self: flex-start;
        }
        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .msg-row.user .msg-avatar {
            background: var(--accent-purple);
            color: #fff;
            font-size: 0.8rem;
        }
        .msg-row.assistant .msg-avatar {
            background: #1a1a35;
            color: var(--accent-gold);
            font-size: 1rem;
        }
        .msg-bubble {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            line-height: 1.55;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.01em;
            word-break: break-word;
        }
        .msg-row.user .msg-bubble {
            background: var(--bubble-user);
            color: #f0edff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 18px rgba(79, 60, 201, 0.35);
        }
        .msg-row.assistant .msg-bubble {
            background: var(--bubble-ai);
            color: #d8d8f0;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .msg-bubble p {
            margin: 0;
        }
        .msg-bubble p+p {
            margin-top: 8px;
        }
        .msg-bubble pre {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            font-size: 0.82rem;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .msg-bubble code {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.84rem;
        }

        /* ── Indicador de escritura ── */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 0;
            align-self: flex-start;
            margin-left: 44px;
            animation: msgIn 0.3s ease;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: bounce 1.2s ease-in-out infinite;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.18s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.36s;
        }
        @keyframes bounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.35;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* ── Mensaje de bienvenida ── */
        .welcome-msg {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin: auto;
        }
        .welcome-msg .big-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 12px;
            animation: iconPulse 3s ease-in-out infinite;
        }
        .welcome-msg strong {
            color: var(--accent-gold);
            font-weight: 600;
        }

        /* ── Barra de entrada ── */
        .input-area {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            padding: 10px 14px;
            background: var(--bg-input);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            flex-shrink: 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.25);
        }
        .input-area textarea {
            flex: 1;
            resize: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font);
            font-size: 0.95rem;
            padding: 8px 4px;
            outline: none;
            line-height: 1.4;
            max-height: 120px;
            min-height: 24px;
            height: 24px;
            transition: var(--transition);
        }
        .input-area textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--accent-purple);
            color: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            flex-shrink: 0;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(124, 92, 252, 0.4);
        }
        .btn-send:hover {
            background: var(--accent-purple-hover);
            box-shadow: 0 6px 24px rgba(124, 92, 252, 0.55);
            transform: translateY(-1px);
        }
        .btn-send:active {
            transform: scale(0.93);
        }
        .btn-send:disabled {
            background: #3a3a55;
            cursor: not-allowed;
            box-shadow: none;
            color: #777;
            transform: none;
        }

        /* ── Modal de configuración ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            max-width: 440px;
            width: 100%;
            box-shadow: var(--shadow-glow), 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .modal-overlay.open .modal-panel {
            transform: translateY(0);
        }
        .modal-panel h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }
        .modal-panel h3 i {
            color: var(--accent-gold);
        }
        .modal-panel .modal-subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 18px;
            line-height: 1.5;
        }
        .modal-panel label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .modal-panel .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .modal-panel input[type="password"],
        .modal-panel input[type="text"] {
            flex: 1;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: var(--bg-input);
            color: #fff;
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }
        .modal-panel input:focus {
            border-color: var(--accent-purple);
