<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>estrellafugaz — Chat con Mistral</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #06060f;
            --bg-card: #0f0f22;
            --bg-chat: #12122a;
            --bg-input: #1a1a35;
            --text-primary: #e8e8f2;
            --text-secondary: #a0a0c0;
            --accent-gold: #f0b940;
            --accent-purple: #7c5cfc;
            --accent-purple-hover: #9178ff;
            --bubble-user: #4f3cc9;
            --bubble-ai: #1e1e3a;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --shadow-glow: 0 0 40px rgba(124, 92, 252, 0.25);
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --font: 'Outfit', system-ui, -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg-deep); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
        body::before {
            content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.7), transparent), radial-gradient(1px 1px at 22% 8%, rgba(255,255,255,0.5), transparent), radial-gradient(1.5px 1.5px at 35% 20%, rgba(255,255,255,0.65), transparent), radial-gradient(1px 1px at 48% 5%, rgba(255,255,255,0.45), transparent), radial-gradient(1.5px 1.5px at 55% 18%, rgba(255,255,255,0.6), transparent), radial-gradient(1px 1px at 62% 12%, rgba(255,255,255,0.5), transparent), radial-gradient(1px 1px at 70% 22%, rgba(255,255,255,0.55), transparent), radial-gradient(1.5px 1.5px at 78% 7%, rgba(255,255,255,0.4), transparent), radial-gradient(1px 1px at 85% 16%, rgba(255,255,255,0.6), transparent), radial-gradient(1px 1px at 92% 10%, rgba(255,255,255,0.5), transparent);
            animation: twinkle 6s ease-in-out infinite alternate;
        }
        @keyframes twinkle { 0%{opacity:0.75;} 50%{opacity:1;} 100%{opacity:0.7;} }
        .shooting-star {
            position: fixed; pointer-events: none; z-index: 0; width: 2px; height: 90px;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 40%, rgba(240,220,160,1) 70%, rgba(240,185,64,0.9) 100%);
            border-radius: 50% 50% 50% 50% / 10% 10% 60% 60%; transform: rotate(-30deg);
            animation: shoot var(--dur) linear infinite; animation-delay: var(--delay); top: -120px; left: var(--start-x); opacity: 0;
        }
        .shooting-star::after {
            content: ''; position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
            width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 12px 4px rgba(255,220,140,0.9), 0 0 30px 10px rgba(240,185,64,0.5);
        }
        @keyframes shoot {
            0%{transform: translateY(0) translateX(0) rotate(-30deg); opacity: 0;}
            5%{opacity: 1;} 15%{opacity: 1;}
            30%{transform: translateY(85vh) translateX(40vw) rotate(-30deg); opacity: 0;}
            100%{transform: translateY(85vh) translateX(40vw) rotate(-30deg); opacity: 0;}
        }
        .app-wrapper { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100vh; max-width: 780px; margin: 0 auto; padding: 12px 16px; gap: 10px; }
        .app-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); flex-shrink: 0; }
        .header-brand { display: flex; align-items: center; gap: 10px; }
        .header-icon { font-size: 1.8rem; animation: iconPulse 3s ease-in-out infinite; filter: drop-shadow(0 0 10px rgba(240,185,64,0.5)); }
        @keyframes iconPulse { 0%,100%{transform: scale(1);} 50%{transform: scale(1.15);} }
        .header-title { font-size: 1.35rem; font-weight: 700; background: linear-gradient(135deg, #f5d780, #f0b940, #e8a420, #f5d780); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s linear infinite; }
        @keyframes shimmer { 0%{background-position: 0% center;} 100%{background-position: 200% center;} }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border-subtle); background: rgba(255,255,255,0.04); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: var(--transition); position: relative; }
        .btn-icon:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
        .api-indicator { position: absolute; top: 7px; right: 7px; width: 9px; height: 9px; border-radius: 50%; background: #555; border: 1.5px solid var(--bg-card); }
        .api-indicator.active { background: #4ade80; box-shadow: 0 0 10px rgba(74,222,128,0.6); }
        .btn-clear { font-size: 0.85rem; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px 10px; border-radius: 20px; font-family: var(--font); }
        .btn-clear:hover { color: #f87171; }
        .chat-area { flex: 1; overflow-y: auto; padding: 10px 6px; display: flex; flex-direction: column; gap: 8px; border-radius: var(--radius-lg); background: var(--bg-chat); border: 1px solid var(--border-subtle); }
        .msg-row { display: flex; gap: 10px; max-width: 88%; animation: msgIn 0.35s ease; }
        @keyframes msgIn { from{opacity: 0; transform: translateY(14px);} to{opacity: 1; transform: translateY(0);} }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.assistant { align-self: flex-start; }
        .msg-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.1); }
        .msg-row.user .msg-avatar { background: var(--accent-purple); color: #fff; }
        .msg-row.assistant .msg-avatar { background: #1a1a35; color: var(--accent-gold); }
        .msg-bubble { padding: 12px 16px; border-radius: var(--radius-md); line-height: 1.55; font-size: 0.95rem; word-break: break-word; }
        .msg-row.user .msg-bubble { background: var(--bubble-user); color: #f0edff; border-bottom-right-radius: 4px; }
        .msg-row.assistant .msg-bubble { background: var(--bubble-ai); color: #d8d8f0; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .typing-indicator { display: flex; gap: 5px; padding: 8px 0; margin-left: 44px; }
        .typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); animation: bounce 1.2s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.18s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.36s; }
        @keyframes bounce { 0%,60%,100%{transform: translateY(0); opacity: 0.35;} 30%{transform: translateY(-10px); opacity: 1;} }
        .welcome-msg { text-align: center; padding: 30px 20px; color: var(--text-secondary); margin: auto; }
        .welcome-msg .big-icon { font-size: 3.5rem; display: block; margin-bottom: 12px; animation: iconPulse 3s infinite; }
        .welcome-msg strong { color: var(--accent-gold); }
        .input-area { display: flex; gap: 10px; padding: 10px 14px; background: var(--bg-input); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
        .input-area textarea { flex: 1; resize: none; background: transparent; border: none; color: var(--text-primary); font-family: var(--font); font-size: 0.95rem; padding: 8px 4px; outline: none; max-height: 120px; min-height: 24px; }
        .input-area textarea::placeholder { color: rgba(255,255,255,0.3); }
        .btn-send { width: 44px; height: 44px; border-radius: 50%; border: none; background: var(--accent-purple); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-send:hover { background: var(--accent-purple-hover); }
        .btn-send:disabled { background: #3a3a55; cursor: not-allowed; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-panel { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 28px 24px; max-width: 440px; width: 100%; }
        .modal-panel h3 { color: #fff; margin-bottom: 6px; }
        .modal-panel h3 i { color: var(--accent-gold); }
        .modal-panel .modal-subtitle { color: var(--text-secondary); margin-bottom: 18px; font-size: 0.85rem; }
        .modal-panel label { color: var(--text-secondary); font-size: 0.82rem; text-transform: uppercase; }
        .modal-panel input { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.12); background: var(--bg-input); color: #fff; margin: 6px 0 14px; font-family: var(--font); }
        .modal-panel input:focus { border-color: var(--accent-purple); outline: none; }
        .btn-sm { padding: 10px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: var(--font); font-weight: 600; }
        .btn-primary { background: var(--accent-purple); color: #fff; }
        .btn-primary:hover { background: var(--accent-purple-hover); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.1); }
        .btn-danger { background: transparent; color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
        .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
        .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.78rem; padding: 5px 10px; border-radius: 20px; }
        .status-badge.ok { background: rgba(74,222,128,0.12); color: #4ade80; }
        .status-badge.info { background: rgba(148,163,184,0.1); color: #94a3b8; }
        @media (max-width: 600px) {
            .app-wrapper { padding: 6px 8px; }
            .msg-row { max-width: 95%; }
        }
    </style>
</head>
<body>
    <div class="shooting-star" style="--dur:8s; --delay:0s; --start-x:15%;"></div>
    <div class="shooting-star" style="--dur:11s; --delay:3s; --start-x:35%;"></div>
    <div class="shooting-star" style="--dur:9s; --delay:5.5s; --start-x:58%;"></div>

    <div class="app-wrapper">
        <header class="app-header">
            <div class="header-brand">
                <span class="header-icon">🌠</span>
                <span class="header-title">estrellafugaz</span>
            </div>
            <div class="header-actions">
                <button class="btn-clear" id="btnClearChat"><i class="fa-solid fa-broom"></i> Limpiar</button>
                <button class="btn-icon" id="btnSettings">
                    <i class="fa-solid fa-gear"></i>
                    <span class="api-indicator" id="apiIndicator"></span>
                </button>
            </div>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="welcome-msg" id="welcomeMsg">
                <span class="big-icon">🌠</span>
                <p><strong>estrellafugaz</strong> está lista para conversar</p>
                <p style="font-size:0.8rem; margin-top:4px;">Configura tu API key de Mistral en ⚙️ para comenzar</p>
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="Escribe tu mensaje..." disabled></textarea>
            <button class="btn-send" id="btnSend" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-panel">
            <h3><i class="fa-solid fa-key"></i> Configuración</h3>
            <p class="modal-subtitle">Ingresa tu API key de Mistral para activar el chat.</p>
            <label>API Key</label>
            <input type="password" id="apiKeyInput" placeholder="Ej: xxxxxxxxxxxxxxxxxxxxxxxx">
            <div style="margin-bottom:12px; display:flex; align-items:center; gap:8px;">
                <span id="statusBadge" class="status-badge info"><i class="fa-solid fa-circle-info"></i> Sin configurar</span>
                <button class="btn-sm btn-secondary" id="btnToggleVisibility"><i class="fa-solid fa-eye"></i></button>
            </div>
            <div class="modal-actions">
                <button class="btn-sm btn-primary" id="btnSaveKey"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                <button class="btn-sm btn-danger" id="btnRemoveKey"><i class="fa-solid fa-trash-can"></i> Eliminar</button>
                <button class="btn-sm btn-secondary" id="btnCloseModal"><i class="fa-solid fa-xmark"></i> Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // ─── LÓGICA COMPLETA DEL CHAT ───
        const chatArea = document.getElementById('chatArea');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const userInput = document.getElementById('userInput');
        const btnSend = document.getElementById('btnSend');
        const modalOverlay = document.getElementById('modalOverlay');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const statusBadge = document.getElementById('statusBadge');
        const apiIndicator = document.getElementById('apiIndicator');

        const STORAGE_KEY = 'estrellafugaz_mistral_key';
        const MISTRAL_API = 'https://api.mistral.ai/v1/chat/completions';
        const MODEL = 'mistral-small-latest';
        let apiKey = null;
        let history = [];
        let loading = false;

        // Inicializar
        function init() {
            apiKey = localStorage.getItem(STORAGE_KEY);
            if (apiKey) apiKeyInput.value = apiKey;
            updateUI();
            if (apiKey) showWelcome();
        }

        function updateUI() {
            const hasKey = !!apiKey;
            userInput.disabled = !hasKey || loading;
            btnSend.disabled = !hasKey || loading || !userInput.value.trim();
            if (hasKey) {
                userInput.placeholder = 'Escribe tu mensaje...';
                apiIndicator.classList.add('active');
                statusBadge.innerHTML = '<i class="fa-solid fa-circle-check"></i> Configurada';
                statusBadge.className = 'status-badge ok';
            } else {
                userInput.placeholder = 'Configura tu API key primero ⚙️';
                apiIndicator.classList.remove('active');
                statusBadge.innerHTML = '<i class="fa-solid fa-circle-info"></i> Sin configurar';
                statusBadge.className = 'status-badge info';
            }
        }

        function showWelcome() {
            if (welcomeMsg && history.length === 0) {
                welcomeMsg.innerHTML = '<span class="big-icon">🌠</span><p><strong>estrellafugaz</strong> está lista ✨</p><p style="font-size:0.8rem;">Escribe tu primer mensaje</p>';
            }
        }

        // Eventos
        document.getElementById('btnSettings').onclick = () => modalOverlay.classList.add('open');
        document.getElementById('btnCloseModal').onclick = () => modalOverlay.classList.remove('open');
        document.getElementById('btnToggleVisibility').onclick = () => {
            apiKeyInput.type = apiKeyInput.type === 'password' ? 'text' : 'password';
        };
        document.getElementById('btnSaveKey').onclick = () => {
            const key = apiKeyInput.value.trim();
            if (key.length < 5) return alert('Clave inválida');
            localStorage.setItem(STORAGE_KEY, key);
            apiKey = key;
            updateUI();
            showWelcome();
            modalOverlay.classList.remove('open');
        };
        document.getElementById('btnRemoveKey').onclick = () => {
            if (confirm('¿Eliminar la clave?')) {
                localStorage.removeItem(STORAGE_KEY);
                apiKey = null;
                history = [];
                chatArea.querySelectorAll('.msg-row, .typing-indicator').forEach(e => e.remove());
                welcomeMsg.innerHTML = '<span class="big-icon">🌠</span><p><strong>estrellafugaz</strong> está lista para conversar</p><p style="font-size:0.8rem;">Configura tu API key de Mistral en ⚙️ para comenzar</p>';
                welcomeMsg.style.display = '';
                updateUI();
                modalOverlay.classList.remove('open');
            }
        };
        document.getElementById('btnClearChat').onclick = () => {
            if (confirm('¿Limpiar conversación?')) {
                history = [];
                chatArea.querySelectorAll('.msg-row, .typing-indicator').forEach(e => e.remove());
                welcomeMsg.style.display = '';
                showWelcome();
            }
        };
        modalOverlay.onclick = (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); };
        userInput.oninput = () => {
            updateUI();
            userInput.style.height = '24px';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        };
        userInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
        };
        btnSend.onclick = enviar;

        // Enviar mensaje
        function enviar() {
            const text = userInput.value.trim();
            if (!text || !apiKey || loading) return;
            welcomeMsg.style.display = 'none';
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            userInput.value = '';
            userInput.style.height = '24px';
            updateUI();
            callAPI();
        }

        function addMessage(role, content) {
            const row = document.createElement('div');
            row.className = 'msg-row ' + role;
            row.innerHTML = `
                <div class="msg-avatar">${role === 'user' ? '<i class="fa-solid fa-user"></i>' : '🌠'}</div>
                <div class="msg-bubble">${content.replace(/\n/g, '<br>')}</div>
            `;
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function callAPI() {
            loading = true;
            updateUI();
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            chatArea.appendChild(indicator);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch(MISTRAL_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: MODEL,
